services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: youtube-analysis-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: techdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube-analysis-app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/techdb
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./templates:/app/templates
    command: python main.py

volumes:
  postgres_data:
    driver: local
